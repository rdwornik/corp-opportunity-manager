naming:
  folder_pattern: "{client}_{product}"
  pptx_pattern: "{client}_{date}_{topic}.pptx"
  date_format: "%Y-%m-%d"

templates:
  discovery_deck: "BY_Discovery_Template.pptx"

folder_structure:
  # Subfolders created in every new project
  # _knowledge/ is always created for metadata; others are optional
  create_dirs:
    - "_knowledge"

stages:
  - discovery
  - qualification
  - rfp
  - proposal
  - negotiation
  - won
  - lost
  - archived

products:
  - Planning
  - WMS
  - TMS
  - CatMan
  - Network
  - Platform
